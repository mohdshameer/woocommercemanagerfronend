name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to fetch tags

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Latest Tag and Increment
        id: vars
        run: |
          # Fetch all tags from the repo
          git fetch --tags
          # Get the latest tag matching 'v*', sort them numerically
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1"
          else
            # Extract the number and add 1
            VERSION_NUM=$(echo $LATEST_TAG | sed 's/v//')
            NEW_TAG="v$((VERSION_NUM + 1))"
          fi
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          # Also tag the local git repo so the next run can find it
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/woocommercemanager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/woocommercemanager:${{ steps.vars.outputs.new_tag }}