name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*' # This triggers the workflow ONLY when you push a Git tag starting with 'v' (e.g., v6)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mohmdshameer/woocommercemanagerfronend
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This automatically applies both the "v6" and "latest" tags generated by the step above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
