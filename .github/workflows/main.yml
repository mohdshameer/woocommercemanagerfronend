name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Triggers the automation when you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This creates two tags: 'latest' and a version number that increases by 1 each time
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/woocommercemanager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/woocommercemanager:v${{ github.run_number }}